name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cmd/ziom/go.mod
          cache-dependency-path: cmd/ziom/go.sum

      - name: Build release assets
        run: make release VERSION="${GITHUB_REF_NAME}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ziom_darwin_arm64
            dist/ziom_darwin_amd64
            dist/ziom_linux_amd64
            dist/ziom_linux_arm64
            dist/checksums.txt
